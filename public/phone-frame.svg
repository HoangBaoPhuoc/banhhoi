<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 650" fill="none">
  <defs>
    <!-- Outer frame gradient (gold titanium) -->
    <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b896"/>
      <stop offset="30%" stop-color="#c9a97c"/>
      <stop offset="60%" stop-color="#b8946a"/>
      <stop offset="100%" stop-color="#c8a87c"/>
    </linearGradient>
    <!-- Frame edge highlight -->
    <linearGradient id="frameEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8cfa0"/>
      <stop offset="20%" stop-color="#c9a97c"/>
      <stop offset="80%" stop-color="#c9a97c"/>
      <stop offset="100%" stop-color="#e2c490"/>
    </linearGradient>
    <!-- Screen glare -->
    <linearGradient id="screenGlare" x1="0" y1="0" x2="0.4" y2="0.3">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Side button gradient -->
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0996a"/>
      <stop offset="50%" stop-color="#d4b080"/>
      <stop offset="100%" stop-color="#b8916a"/>
    </linearGradient>
  </defs>

  <!-- Left buttons (volume) -->
  <rect x="0" y="148" width="6" height="44" rx="3" fill="url(#btnGrad)"/>
  <rect x="0" y="204" width="6" height="44" rx="3" fill="url(#btnGrad)"/>
  <!-- Left silent toggle -->
  <rect x="0" y="108" width="6" height="28" rx="3" fill="url(#btnGrad)"/>

  <!-- Right button (power) -->
  <rect x="314" y="168" width="6" height="72" rx="3" fill="url(#btnGrad)"/>

  <!-- Outer phone body -->
  <rect x="6" y="0" width="308" height="650" rx="52" fill="url(#frameGrad)"/>

  <!-- Inner frame highlight ring -->
  <rect x="6" y="0" width="308" height="650" rx="52" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <!-- Screen background -->
  <rect x="17" y="10" width="286" height="630" rx="44" fill="white"/>

  <!-- Screen glare overlay -->
  <rect x="17" y="10" width="286" height="630" rx="44" fill="url(#screenGlare)"/>

  <!-- Dynamic Island -->
  <rect x="104" y="22" width="112" height="32" rx="16" fill="#111"/>

  <!-- Status bar left: time -->
  <text x="36" y="42" font-family="-apple-system, SF Pro Display, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#111">9:41</text>

  <!-- Status bar right icons (simplified) -->
  <!-- Signal bars -->
  <rect x="233" y="33" width="3" height="8" rx="1" fill="#111"/>
  <rect x="238" y="30" width="3" height="11" rx="1" fill="#111"/>
  <rect x="243" y="27" width="3" height="14" rx="1" fill="#111"/>
  <rect x="248" y="24" width="3" height="17" rx="1" fill="#111"/>
  <!-- Wifi -->
  <path d="M258 38 Q263 32 268 38" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M255 41 Q263 29 271 41" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="263" cy="41" r="1.5" fill="#111"/>
  <!-- Battery -->
  <rect x="276" y="28" width="22" height="13" rx="3" fill="none" stroke="#111" stroke-width="1.5"/>
  <rect x="298" y="32" width="2.5" height="5" rx="1" fill="#111"/>
  <rect x="278" y="30" width="16" height="9" rx="2" fill="#111"/>

  <!-- Subtle bottom chin -->
  <rect x="17" y="628" width="286" height="12" rx="0" fill="white"/>
  <rect x="17" y="628" width="286" height="12" rx="44" fill="white"/>

  <!-- Home indicator -->
  <rect x="118" y="634" width="84" height="4" rx="2" fill="#ccc"/>

  <!-- Outer frame bottom edge shadow -->
  <rect x="6" y="0" width="308" height="650" rx="52" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
</svg>
